name: Build HRD Probe Windows

on:
  workflow_dispatch:
  push:
    paths:
      - "tools/hrd_probe.py"
      - "tools/hrd_tap.py"
      - ".github/workflows/build-hrd-probe-windows.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Build hrd_probe.exe
        shell: pwsh
        run: |
          pyinstaller `
            --onefile `
            --console `
            --name hrd_probe `
            --clean `
            tools/hrd_probe.py
          Get-ChildItem dist

      - name: Build hrd_tap.exe
        shell: pwsh
        run: |
          pyinstaller `
            --onefile `
            --console `
            --name hrd_tap `
            --clean `
            tools/hrd_tap.py
          Get-ChildItem dist

      - name: Smoke test help
        shell: pwsh
        run: |
          .\dist\hrd_probe.exe --help
          .\dist\hrd_tap.exe --help

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: hrd-diagnostics-windows-x64
          if-no-files-found: error
          path: |
            dist/hrd_probe.exe
            dist/hrd_tap.exe
