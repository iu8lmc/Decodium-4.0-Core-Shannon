name: Build Windows + SignPath Code Signing

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  BUILD_TAG: ${{ github.run_number }}

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-multimedia
            mingw-w64-x86_64-qt6-serialport
            mingw-w64-x86_64-qt6-websockets
            mingw-w64-x86_64-qt6-svg
            mingw-w64-x86_64-qt6-tools
            mingw-w64-x86_64-qt6-declarative
            mingw-w64-x86_64-qt6-shadertools
            mingw-w64-x86_64-qt6-5compat
            mingw-w64-x86_64-fftw
            mingw-w64-x86_64-libhamlib
            mingw-w64-x86_64-libusb
            mingw-w64-x86_64-boost

      - name: Extract version from tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VER="${GITHUB_REF#refs/tags/v}"
          else
            VER="0.0.${BUILD_TAG}"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Version: $VER"

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=MinSizeRel

      - name: Build application
        run: ninja -C build decodium_app

      - name: Prepare distribution
        run: |
          DIST="dist-windows-x64"
          mkdir -p "$DIST"

          # Copy main executable
          cp build/decodium.exe "$DIST/"

          # Copy QML files
          cp -R build/qml "$DIST/"

          # Qt6 and MinGW DLLs
          QTDIR="/mingw64"

          # Qt6 core DLLs
          for dll in Qt6Core Qt6Gui Qt6Widgets Qt6Network Qt6Multimedia \
                     Qt6MultimediaWidgets Qt6SerialPort Qt6WebSockets \
                     Qt6Sql Qt6Svg Qt6PrintSupport Qt6Qml Qt6QmlModels \
                     Qt6Quick Qt6QuickControls2 Qt6QuickControls2Impl \
                     Qt6QuickLayouts Qt6QuickTemplates2 Qt6QmlWorkerScript \
                     Qt6OpenGL Qt6ShaderTools Qt6Core5Compat; do
            [ -f "$QTDIR/bin/${dll}.dll" ] && cp "$QTDIR/bin/${dll}.dll" "$DIST/" 2>/dev/null || true
          done

          # MinGW runtime DLLs
          cp "$QTDIR"/bin/libgcc_s_*.dll "$QTDIR"/bin/libstdc++-6.dll \
             "$QTDIR"/bin/libwinpthread-1.dll "$DIST/" 2>/dev/null || true
          cp "$QTDIR"/bin/libgfortran-5.dll "$QTDIR"/bin/libgomp-1.dll \
             "$QTDIR"/bin/libquadmath-0.dll "$DIST/" 2>/dev/null || true

          # Other required DLLs
          for dll in libfftw3f-3 libfftw3f_threads-3 libhamlib-4 libusb-1.0 \
                     zlib1 libbz2-1 liblzma-5 libpcre2-8-0 libpcre2-16-0 \
                     libpng16-16 libjpeg-8 libfreetype-6 libharfbuzz-0 libgraphite2 \
                     libiconv-2 libintl-8 libglib-2.0-0 libmd4c libdouble-conversion \
                     libbrotlicommon libbrotlidec libzstd libcrypto-3-x64 libssl-3-x64; do
            [ -f "$QTDIR/bin/${dll}.dll" ] && cp "$QTDIR/bin/${dll}.dll" "$DIST/" 2>/dev/null || true
          done

          # ICU DLLs
          cp "$QTDIR"/bin/libicu*.dll "$DIST/" 2>/dev/null || true

          # Qt6 plugins
          mkdir -p "$DIST"/{platforms,audio,imageformats,sqldrivers,styles,multimedia,tls,networkinformation,qmltooling}
          cp "$QTDIR"/share/qt6/plugins/platforms/qwindows.dll "$DIST/platforms/" 2>/dev/null || true
          cp "$QTDIR"/share/qt6/plugins/audio/*.dll "$DIST/audio/" 2>/dev/null || true
          cp "$QTDIR"/share/qt6/plugins/imageformats/*.dll "$DIST/imageformats/" 2>/dev/null || true
          cp "$QTDIR"/share/qt6/plugins/sqldrivers/*.dll "$DIST/sqldrivers/" 2>/dev/null || true
          cp "$QTDIR"/share/qt6/plugins/styles/*.dll "$DIST/styles/" 2>/dev/null || true
          cp "$QTDIR"/share/qt6/plugins/multimedia/*.dll "$DIST/multimedia/" 2>/dev/null || true
          cp "$QTDIR"/share/qt6/plugins/tls/*.dll "$DIST/tls/" 2>/dev/null || true
          cp "$QTDIR"/share/qt6/plugins/networkinformation/*.dll "$DIST/networkinformation/" 2>/dev/null || true

          # Qt6 QML modules (system)
          mkdir -p "$DIST/qml"
          for mod in QtQml QtQuick Qt; do
            [ -d "$QTDIR/share/qt6/qml/$mod" ] && cp -R "$QTDIR/share/qt6/qml/$mod" "$DIST/qml/" 2>/dev/null || true
          done

          # Data files
          cp cty.dat "$DIST/" 2>/dev/null || true

          echo "=== Distribution contents ==="
          find "$DIST" -name "*.exe" | sort
          echo "Total files: $(find "$DIST" -type f | wc -l)"
          du -sh "$DIST"

      - name: Upload unsigned artifact
        uses: actions/upload-artifact@v4
        with:
          name: decodium-unsigned-x64
          if-no-files-found: error
          path: dist-windows-x64

  sign:
    needs: build-windows
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
      - name: Download unsigned artifact
        uses: actions/download-artifact@v4
        with:
          name: decodium-unsigned-x64
          path: unsigned-x64

      - name: Repackage for SignPath
        run: |
          cd unsigned-x64
          zip -r ../decodium-x64.zip .

      - name: Upload artifact for SignPath
        id: upload-for-signing
        uses: actions/upload-artifact@v4
        with:
          name: decodium-to-sign-x64
          path: decodium-x64.zip

      - name: Submit signing request to SignPath
        id: signpath
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ vars.SIGNPATH_ORGANIZATION_ID }}'
          project-slug: 'decodium'
          signing-policy-slug: >-
            ${{ startsWith(github.ref, 'refs/tags/v')
                && 'release-signing'
                || 'test-signing' }}
          github-artifact-id: '${{ steps.upload-for-signing.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: 'signed-x64'

      - name: Upload signed artifact
        uses: actions/upload-artifact@v4
        with:
          name: decodium-signed-x64
          path: signed-x64
          if-no-files-found: error

  package:
    needs: sign
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout (for installer scripts)
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          $VER = "$env:GITHUB_REF" -replace 'refs/tags/v',''
          echo "version=$VER" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Download signed x64
        uses: actions/download-artifact@v4
        with:
          name: decodium-signed-x64
          path: dist-windows-x64

      - name: Build installer with Inno Setup
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DAppVersion="${{ steps.version.outputs.version }}" `
            /DBuildDir="dist-windows-x64" `
            /DSourceRoot="." `
            /DOutputDir="installer\output" `
            /DOutputBaseFilename="Decodium_${{ steps.version.outputs.version }}_Setup_x64" `
            "installer\decodium_setup.iss"
        shell: pwsh

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: decodium-installer
          path: installer/output/Decodium_*.exe
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: installer/output/Decodium_*.exe
          draft: true
          generate_release_notes: true
